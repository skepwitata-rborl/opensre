name: Deploy Upstream Downstream Pipeline

on:
  push:
    branches: ["*"]

jobs:
  deploy:
    name: Deploy CDK Stack
    runs-on: ubuntu-latest
    
    env:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/test_case_upstream_downstream_pipeline/infrastructure/requirements/requirements.txt
          # Also install project requirements for validation script
          pip install -r requirements.txt

      - name: Run pre-deployment validation
        working_directory: tests/test_case_upstream_downstream_pipeline/infrastructure/cdk
        run: python3 ../tests/validate_setup.py

      - name: CDK Bootstrap
        working_directory: tests/test_case_upstream_downstream_pipeline/infrastructure/cdk
        run: cdk bootstrap

      - name: CDK Deploy
        working_directory: tests/test_case_upstream_downstream_pipeline/infrastructure/cdk
        run: cdk deploy --require-approval never
